<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siapa yang Bergerak? — Gerak Relatif | IPA Kelas 7</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root {
    --bg:#0b1220; --card:rgba(255,255,255,.05); --border:rgba(255,255,255,.12);
    --cyan:#22d3ee; --violet:#a78bfa; --green:#4ade80; --red:#f87171; --amber:#fbbf24;
  }
  body {
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:radial-gradient(1200px 700px at 70% -10%, rgba(34,211,238,.14), transparent 60%),
               radial-gradient(900px 600px at 10% 110%, rgba(167,139,250,.12), transparent 60%), var(--bg);
    color:#fff; min-height:100vh; user-select:none; -webkit-user-select:none;
  }
  .wrap { max-width:1100px; margin:0 auto; padding:20px 24px 50px; }
  header { display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .brand { font-size:clamp(14px,1.6vw,18px); color:rgba(255,255,255,.55); letter-spacing:.14em; text-transform:uppercase; }
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:10px; border:1px solid var(--border); background:var(--card); color:#fff; border-radius:16px; padding:14px 26px; font-size:clamp(15px,1.8vw,20px); font-weight:700; cursor:pointer; transition:transform .15s; }
  .btn:active { transform:scale(.96); }
  .btn.primary { background:linear-gradient(135deg, rgba(34,211,238,.25), rgba(167,139,250,.2)); border-color:rgba(34,211,238,.5); }
  .btn.small { padding:10px 18px; font-size:15px; border-radius:12px; }
  h1 { font-size:clamp(24px,3.6vw,42px); text-align:center; margin-top:12px; }
  h1 .hl { background:linear-gradient(90deg,var(--cyan),var(--violet)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .sub { text-align:center; color:rgba(255,255,255,.6); font-size:clamp(14px,1.8vw,19px); margin-top:6px; }
  .tabs { display:flex; gap:10px; justify-content:center; margin-top:18px; flex-wrap:wrap; }
  .tab { border:1px solid var(--border); background:var(--card); color:rgba(255,255,255,.7); border-radius:999px; padding:12px 24px; font-size:clamp(14px,1.8vw,18px); font-weight:700; cursor:pointer; transition:.2s; }
  .tab.active { background:rgba(34,211,238,.16); border-color:var(--cyan); color:#fff; box-shadow:0 0 20px rgba(34,211,238,.2); }
  .screen { display:none; } .screen.active { display:block; animation:fadeIn .35s; }
  @keyframes fadeIn { from{opacity:0; transform:translateY(12px);} to{opacity:1; transform:none;} }
  @keyframes shake { 0%,100%{transform:none} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  @keyframes rollBus { from{transform:translateX(-180px)} to{transform:translateX(940px)} }
  @keyframes cloudsMove { from{transform:translateX(0)} to{transform:translateX(-330px)} }
  @keyframes treesMove { from{transform:translateX(0)} to{transform:translateX(-460px)} }

  .panel { background:var(--card); border:1px solid var(--border); border-radius:22px; max-width:940px; margin:18px auto 0; padding:clamp(18px,3vw,30px); }
  .panel p { color:rgba(255,255,255,.75); line-height:1.65; font-size:clamp(14px,1.8vw,18px); }
  .sceneBox { background:rgba(255,255,255,.03); border:1px solid var(--border); border-radius:18px; overflow:hidden; margin-top:14px; }
  .sceneBox svg { display:block; width:100%; height:auto; }
  .acuanRow { display:flex; gap:10px; justify-content:center; margin-top:16px; flex-wrap:wrap; }
  .acuanBtn { border:1px solid var(--border); background:var(--card); color:#fff; border-radius:14px; padding:12px 20px; font-size:clamp(14px,1.8vw,17px); font-weight:700; cursor:pointer; transition:.2s; }
  .acuanBtn.sel { border-color:var(--amber); background:rgba(251,191,36,.15); box-shadow:0 0 16px rgba(251,191,36,.3); }
  .statusGrid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-top:16px; }
  @media(max-width:640px){ .statusGrid{ grid-template-columns:1fr; } }
  .statusCard { background:rgba(255,255,255,.03); border:1px solid var(--border); border-radius:14px; padding:13px; text-align:center; }
  .statusCard .who { font-size:clamp(14px,1.7vw,17px); font-weight:700; }
  .statusCard .st { margin-top:6px; font-size:clamp(15px,1.9vw,19px); font-weight:800; }
  .st.gerak { color:var(--green); } .st.diam { color:var(--cyan); }
  .fb { border-radius:16px; padding:14px 20px; margin-top:16px; font-size:clamp(14px,1.8vw,18px); line-height:1.6; display:none; border:1px solid; text-align:center; }
  .fb.show { display:block; animation:fadeIn .3s; }
  .fb.good { background:rgba(74,222,128,.1); border-color:rgba(74,222,128,.4); }
  .fb.bad { background:rgba(248,113,113,.1); border-color:rgba(248,113,113,.4); }
  .fb.info { background:rgba(34,211,238,.08); border-color:rgba(34,211,238,.35); }

  .qtext { text-align:center; font-size:clamp(16px,2.3vw,24px); font-weight:800; line-height:1.55; }
  .opts { display:grid; grid-template-columns:1fr 1fr; gap:13px; margin-top:18px; }
  @media(max-width:560px){ .opts{ grid-template-columns:1fr; } }
  .opt { border:1px solid var(--border); background:var(--card); color:#fff; border-radius:15px; padding:16px 12px; font-size:clamp(14px,2vw,19px); font-weight:700; cursor:pointer; transition:transform .15s; line-height:1.45; }
  .opt:active { transform:scale(.96); }
  .opt.correct { border-color:var(--green); background:rgba(74,222,128,.16); }
  .opt.wrong { border-color:var(--red); background:rgba(248,113,113,.16); animation:shake .4s; }
  .meta { text-align:center; margin-top:10px; color:rgba(255,255,255,.55); font-size:15px; }
  .nextRow { text-align:center; margin-top:16px; }
  .qcap { text-align:center; font-size:clamp(36px,5.5vw,58px); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="brand">IPA Kelas 7 · Bab 4</span>
    <button class="btn small" onclick="kembali()">← Kembali</button>
  </header>

  <h1>Siapa yang <span class="hl">Bergerak?</span> 🚌</h1>
  <p class="sub">Bergerak atau diam itu tergantung dari mana kamu melihatnya — semua gerak itu relatif!</p>

  <div class="tabs">
    <button class="tab active" onclick="setTab(0,this)">🚏 Pilih Titik Acuan</button>
    <button class="tab" onclick="setTab(1,this)">🎯 Kuis Gerak</button>
  </div>

  <!-- TAB 0 -->
  <section class="screen active" id="tab0">
    <div class="panel">
      <p style="text-align:center">Bus melaju di jalan. <b>Sentuh titik acuan</b> di bawah, lalu lihat: siapa yang "bergerak" menurut acuan itu?</p>
      <div class="sceneBox">
        <svg viewBox="0 0 760 300" xmlns="http://www.w3.org/2000/svg">
          <rect width="760" height="300" fill="#101a30"/>
          <!-- awan -->
          <g id="clouds" fill="#334766">
            <g style="animation:cloudsMove 12s linear infinite">
              <ellipse cx="120" cy="52" rx="46" ry="17"/><ellipse cx="360" cy="38" rx="55" ry="19"/><ellipse cx="600" cy="56" rx="42" ry="15"/>
              <ellipse cx="450" cy="52" rx="46" ry="17" transform="translate(330,0)"/><ellipse cx="690" cy="38" rx="55" ry="19" transform="translate(330,0)"/>
            </g>
          </g>
          <!-- pohon-pohon (tanah, diam terhadap bumi) -->
          <g id="trees"><g></g></g>
          <!-- jalan -->
          <rect x="0" y="212" width="760" height="60" fill="#1c2942"/>
          <line x1="0" y1="242" x2="760" y2="242" stroke="#3d5378" stroke-width="5" stroke-dasharray="34 26"/>
          <!-- halte + orang diam -->
          <g id="halte">
            <rect x="60" y="150" width="10" height="62" fill="#475569"/>
            <rect x="34" y="138" width="86" height="16" rx="6" fill="#64748b"/>
            <circle cx="100" cy="176" r="12" fill="#f0c49a"/>
            <rect x="91" y="189" width="18" height="26" rx="7" fill="#16a34a"/>
            <text x="78" y="290" text-anchor="middle" font-size="14" fill="#94a3b8">Sinta (di halte)</text>
          </g>
          <!-- bus -->
          <g id="bus">
            <g style="animation:rollBus 7s linear infinite">
              <rect x="0" y="140" width="170" height="70" rx="12" fill="#f59e0b"/>
              <rect x="10" y="152" width="34" height="26" rx="5" fill="#bfe3ff"/>
              <rect x="52" y="152" width="34" height="26" rx="5" fill="#bfe3ff"/>
              <rect x="94" y="152" width="34" height="26" rx="5" fill="#bfe3ff"/>
              <circle cx="40" cy="212" r="15" fill="#0f172a" stroke="#475569" stroke-width="4"/>
              <circle cx="130" cy="212" r="15" fill="#0f172a" stroke="#475569" stroke-width="4"/>
              <circle cx="69" cy="160" r="8" fill="#f0c49a"/>
              <rect x="63" y="168" width="12" height="10" rx="4" fill="#dc2626"/>
              <text x="85" y="132" text-anchor="middle" font-size="14" fill="#fbbf24" font-weight="700">Bayu (dalam bus) 🚌</text>
            </g>
          </g>
        </svg>
      </div>
      <div class="acuanRow" id="acuanRow"></div>
      <div class="statusGrid" id="statusGrid"></div>
      <div class="fb info show" id="relFb">Pilih titik acuan dulu! 👆</div>
    </div>
  </section>

  <!-- TAB 1 -->
  <section class="screen" id="tab1">
    <div class="panel">
      <div class="qcap" id="qE"></div>
      <div class="qtext" id="qQ"></div>
      <div class="opts" id="qOpts"></div>
      <div class="fb" id="qFb"></div>
      <div class="meta" id="qMeta"></div>
      <div class="nextRow"><button class="btn primary" id="qNext" style="display:none" onclick="nextQ()">Lanjut ➜</button></div>
    </div>
  </section>
</div>

<script>
let actx=null;
function tone(f,d,t='sine',v=.18,w=0){ try{ actx=actx||new (window.AudioContext||window.webkitAudioContext)(); const o=actx.createOscillator(),g=actx.createGain(); o.type=t;o.frequency.value=f; g.gain.setValueAtTime(v,actx.currentTime+w); g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+w+d); o.connect(g);g.connect(actx.destination); o.start(actx.currentTime+w);o.stop(actx.currentTime+w+d);}catch(e){} }
const sndGood=()=>{tone(660,.12);tone(880,.18,'sine',.18,.1)}, sndBad=()=>tone(220,.22,'sawtooth',.1);
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function setTab(n, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('tab'+n).classList.add('active');
}

/* isi pohon */
(() => {
  const g = document.querySelector('#trees g');
  let h = '';
  for (let x=40; x<1300; x+=115) {
    h += `<rect x="${x}" y="176" width="9" height="36" fill="#7c4a1e"/><circle cx="${x+4}" cy="164" r="21" fill="#166534"/>`;
  }
  g.innerHTML = h;
})();

/* ---------- TAB 0: titik acuan ---------- */
const ACUAN = [
  { id:'sinta', label:'🚏 Acuan: Sinta (di halte)',
    status:{ bus:'BERGERAK', bayu:'BERGERAK', pohon:'DIAM' },
    x:'Menurut Sinta yang diam di tanah: bus dan Bayu <b>bergerak</b> menjauhinya, sedangkan pohon <b>diam</b>.' },
  { id:'bayu', label:'🚌 Acuan: Bayu (penumpang bus)',
    status:{ bus:'DIAM', bayu:'DIAM', pohon:'BERGERAK' },
    x:'Menurut Bayu: bus dan dirinya <b>diam</b> (jaraknya ke bus tidak berubah), justru pohon dan halte yang tampak <b>bergerak ke belakang</b>! Inilah <b>gerak semu</b> — benda diam yang seolah-olah bergerak.' },
];
const WHO = [ ['bus','🚌 Bus'], ['bayu','🧍 Bayu'], ['pohon','🌳 Pohon di tepi jalan'] ];

const ar = document.getElementById('acuanRow');
ACUAN.forEach((a,i) => {
  const b = document.createElement('button');
  b.className='acuanBtn'; b.textContent = a.label;
  b.onclick = () => {
    [...ar.children].forEach(c=>c.classList.remove('sel'));
    b.classList.add('sel');
    const sg = document.getElementById('statusGrid');
    sg.innerHTML = WHO.map(([id,nm]) => `
      <div class="statusCard"><div class="who">${nm}</div>
      <div class="st ${a.status[id]==='DIAM'?'diam':'gerak'}">${a.status[id]==='DIAM'?'⏸️ DIAM':'▶️ BERGERAK'}</div></div>`).join('');
    const fb = document.getElementById('relFb');
    fb.className='fb info show';
    fb.innerHTML = a.x;
    tone(520,.08,'sine',.12);
  };
  ar.appendChild(b);
});

/* ---------- TAB 1: kuis ---------- */
const QUIZ = shuffle([
  { e:'🚆', q:'Andi duduk di kereta yang melaju. Menurut titik acuan KERETA, Andi dalam keadaan…',
    o:['Diam','Bergerak','Melayang','Dipercepat'], a:0, x:'Jarak Andi terhadap kereta tidak berubah, jadi menurut acuan kereta ia DIAM. Menurut acuan stasiun, ia bergerak. Itulah gerak relatif!' },
  { e:'🌅', q:'Matahari tampak "terbit" di timur dan "tenggelam" di barat. Gerakan matahari ini disebut…',
    o:['Gerak semu','Gerak lurus','Gerak nyata','Gerak jatuh'], a:0, x:'Sebenarnya BUMI yang berputar (rotasi), tetapi matahari seolah-olah bergerak — gerak semu harian matahari.' },
  { e:'🚗', q:'Dari dalam mobil yang melaju, pohon-pohon di tepi jalan tampak berlari ke belakang. Ini contoh…',
    o:['Gerak semu','Gerak sungguhan pohon','Pohon tertiup angin','Gerak GLBB'], a:0, x:'Pohon sebenarnya diam terhadap bumi — ia hanya TAMPAK bergerak karena pengamatnya (kita) yang bergerak.' },
  { e:'📍', q:'Suatu benda dikatakan BERGERAK jika…',
    o:['Kedudukannya berubah terhadap titik acuan','Ia mengeluarkan suara','Ia berpindah lebih dari 1 km','Bentuknya berubah'], a:0, x:'Kunci definisi gerak: PERUBAHAN KEDUDUKAN terhadap titik acuan tertentu.' },
  { e:'🧑‍✈️', q:'Pilot pesawat yang sedang terbang dikatakan DIAM jika titik acuannya adalah…',
    o:['Pesawat yang dikemudikannya','Bandara','Gunung di bawahnya','Penonton di darat'], a:0, x:'Terhadap pesawatnya, kedudukan pilot tidak berubah → diam. Terhadap bandara, ia bergerak sangat cepat!' },
  { e:'🚲', q:'Rina naik sepeda melewati Budi yang berdiri di trotoar. Pernyataan yang BENAR adalah…',
    o:['Menurut Budi, Rina bergerak; menurut Rina, Budi yang tampak bergerak','Keduanya pasti diam','Hanya Rina yang boleh disebut bergerak','Budi bergerak menurut semua acuan'], a:0, x:'Gerak itu relatif: masing-masing bisa menganggap yang lain bergerak, tergantung titik acuannya.' },
  { e:'🌙', q:'Bulan tampak "mengikuti" kita saat kita berjalan di malam hari. Penyebabnya…',
    o:['Bulan sangat jauh sehingga arah pandang hampir tidak berubah','Bulan memang mengejar kita','Gravitasi bulan menarik kita','Bulan bergerak cepat sekali'], a:0, x:'Karena jaraknya sangat jauh, perpindahan kita hampir tidak mengubah arah pandang ke bulan — bulan seolah ikut bergerak (gerak semu).' },
  { e:'⛵', q:'Penumpang perahu yang hanyut mengikuti arus sungai merasa airnya diam, tetapi orang di jembatan melihat perahu bergerak. Kesimpulannya…',
    o:['Hasil pengamatan gerak bergantung titik acuan','Orang di jembatan salah lihat','Airnya memang tidak mengalir','Perahu itu diam mutlak'], a:0, x:'Tidak ada benda yang mutlak diam atau bergerak — semuanya bergantung acuan.' },
]);
let qi=0, score=0, lock=false;
function renderQ() {
  lock=false;
  const q = QUIZ[qi];
  document.getElementById('qE').textContent = q.e;
  document.getElementById('qQ').textContent = q.q;
  document.getElementById('qFb').className='fb';
  document.getElementById('qNext').style.display='none';
  document.getElementById('qMeta').textContent = `Soal ${qi+1} dari ${QUIZ.length} · Skor: ${score}`;
  const box = document.getElementById('qOpts');
  box.innerHTML='';
  shuffle(q.o.map((t,i)=>({t,i}))).forEach(({t,i}) => {
    const b = document.createElement('button');
    b.className='opt'; b.textContent=t;
    b.onclick = () => {
      if (lock) return; lock=true;
      const fb = document.getElementById('qFb');
      [...box.children].forEach(c=>c.disabled=true);
      if (i===q.a) { b.classList.add('correct'); score+=10; sndGood(); fb.className='fb show good'; fb.innerHTML='✅ <b>Benar!</b> '+q.x; }
      else { b.classList.add('wrong'); sndBad(); [...box.children].find(c=>c.textContent===q.o[q.a]).classList.add('correct'); fb.className='fb show bad'; fb.innerHTML='❌ Jawabannya: <b>'+q.o[q.a]+'</b>. '+q.x; }
      document.getElementById('qMeta').textContent = `Soal ${qi+1} dari ${QUIZ.length} · Skor: ${score}`;
      document.getElementById('qNext').style.display='inline-flex';
      document.getElementById('qNext').textContent = qi+1<QUIZ.length?'Lanjut ➜':'Ulangi 🔁';
    };
    box.appendChild(b);
  });
}
function nextQ() { qi++; if (qi>=QUIZ.length){ qi=0; score=0; shuffle(QUIZ); tone(523,.15); tone(659,.15,'sine',.18,.15); } renderQ(); }
renderQ();
</script>
<script>function kembali(){if(history.length>1){history.back();return;}window.close();if(location.protocol!=="file:"){setTimeout(function(){location.href="/simulasi-ipa";},200);}}</script></body>
</html>
